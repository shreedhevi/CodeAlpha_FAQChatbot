<!DOCTYPE html>
<html>
<head>
    <title>FAQ Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, yellow, pink);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chatbox {
            width: 350px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
            color: purple;
        }

        #messages {
            height: 250px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        .user {
            color: blue;
        }

        .bot {
            color: green;
        }

        input {
            width: 70%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            background: purple;
            color: white;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div id="chatbox">
    <h2>💬 FAQ Chatbot</h2>

    <div id="messages"></div>

    <input type="text" id="userInput" placeholder="Type your question..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput").value;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: input})
    })
    .then(res => res.json())
    .then(data => {
        let messages = document.getElementById("messages");

        messages.innerHTML += "<p class='user'><b>You:</b> " + input + "</p>";
        messages.innerHTML += "<p class='bot'><b>Bot:</b> " + data.reply + "</p>";

        document.getElementById("userInput").value = "";
        messages.scrollTop = messages.scrollHeight;
    });
}
</script>

</body>
</html>
